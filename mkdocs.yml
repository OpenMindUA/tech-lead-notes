site_name: Tech Lead Notes
site_description: Operational playbook for tech leads — three-tier mirror of CC-licensed PM/Scrum/DORA/Kanban/strategy resources (PMBOK 7 commentary, Scrum Guide 2020, Scrum Guide Expansion Pack v2026.1, DORA Metrics in Jira, NUPP, P3.express, micro.P3.express, The Kanban Guide, Open Guide to Kanban, Wardley Maps) with distilled cards and full text for humans and LLM agents.
site_url: https://openmindua.github.io/tech-lead-notes/
repo_url: https://github.com/OpenMindUA/tech-lead-notes
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - tags

