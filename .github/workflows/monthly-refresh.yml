name: Monthly upstream snapshot refresh

# Re-fetches CC-licensed upstream sources (Scrum Guide, Scrum Guide
# Expansion Pack, NUPP, P3.express, micro.P3.express), regenerates Tier-3
# chunks, and opens a PR if any committed snapshots have drifted. This way
# upstream changes show up as a reviewable diff instead of being silently
# absorbed by the live build.

on:
  schedule:
    # 1st of each month at 06:00 UTC (~ 08:00 CET / 09:00 EEST)
    - cron: "0 6 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies (docs + ingest)
        run: uv sync --group docs --group ingest

      - name: Fetch Scrum Guide
        run: uv run python scripts/ingest_scrum_guide.py

      - name: Fetch Scrum Guide Expanded
        run: uv run python scripts/ingest_scrum_guide_expanded.py

      - name: Fetch NUPP
        run: uv run python scripts/ingest_nupp.py

      - name: Fetch P3.express
        run: uv run python scripts/ingest_p3_express.py

      - name: Fetch micro.P3.express
        run: uv run python scripts/ingest_micro_p3_express.py

      - name: Fetch The Kanban Guide
        run: uv run python scripts/ingest_kanban_guide.py

      - name: Fetch Open Guide to Kanban
        run: uv run python scripts/ingest_open_kanban_guide.py

      - name: Re-split deterministic sources
        run: |
          uv run python scripts/split_book.py
          uv run python scripts/split_dora_metrics.py

      - name: Regenerate llms.txt / llms-full.txt
        env:
          LLMS_RAW_BASE: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/docs
          LLMS_SITE_BASE: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: uv run python scripts/build_llms_txt.py

      - name: Verify mkdocs --strict build still passes
        run: uv run mkdocs build --strict

      - name: Detect changes
        id: diff
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git status --short | head -50
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No upstream changes detected."
          fi

      - name: Open PR with refreshed snapshots
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/upstream-refresh
          delete-branch: true
          commit-message: |
            chore: refresh upstream snapshots

            Auto-generated by .github/workflows/monthly-refresh.yml.
          title: "chore: monthly upstream snapshot refresh"
          body: |
            Automated monthly fetch from canonical sources detected drift in
            one or more committed snapshots.

            **Sources re-fetched:**
            - <https://scrumguides.org/scrum-guide.html>
            - <https://scrumexpansion.org/scrum-guide-expanded/>
            - <https://nupp.guide/>
            - <https://p3.express/manual/v2/>
            - <https://micro.p3.express/>

            **What's in this PR:**
            - Updated `raw-sources/scrum-guide.md` and/or
              `raw-sources/scrum-guide-expanded.md`
            - Re-split `docs/sources/scrum-guide/` and/or
              `docs/sources/scrum-guide-expanded/`
            - Re-split deterministic sources (UtS, DORA) for consistency
            - Regenerated `llms.txt` and `llms-full.txt`

            **Review checklist before merging:**
            - [ ] Scan diff for unexpected structural changes (new sections,
                  renames, removals)
            - [ ] If a Tier-2 distilled card references a renamed/removed
                  Tier-3 chunk, fix the cross-ref
            - [ ] If new Tier-3 sections appeared, consider whether they
                  warrant new distilled cards
            - [ ] `mkdocs build --strict` passed in CI ✅
          labels: |
            chore
            upstream-refresh
            automated
          author: "tech-lead-notes-bot <noreply@github.com>"
